services:
  postgres:
    image: postgres:16-alpine
    container_name: tictocpharma-postgres-staging
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: tictoc_staging
      POSTGRES_PASSWORD: tictoc_staging_password
      POSTGRES_DB: tictocpharma_staging
    volumes:
      - tictocpharma_postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tictoc_staging -d tictocpharma_staging"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  tictocpharma_postgres_staging_data:
    name: tictocpharma_postgres_staging_data
