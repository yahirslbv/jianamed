services:
  app:
    build:
      context: .
    env_file:
      - .env.preproduction
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      - tictocpharma_preproduction_uploads:/app/uploads/products
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional local-only PostgreSQL for rehearsing the container deployment.
  # Managed PostgreSQL is recommended for public preproduction and production.
  postgres:
    image: postgres:16-alpine
    profiles: ["local-postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tictoc_preproduction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-before-use}
      POSTGRES_DB: ${POSTGRES_DB:-tictocpharma_preproduction}
    volumes:
      - tictocpharma_preproduction_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  tictocpharma_preproduction_uploads:
  tictocpharma_preproduction_postgres:
