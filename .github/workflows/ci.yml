# CI/CD — Tic Toc Pharma
# Pipeline único: en cada push a main se valida, se prueba y —solo si todo
# pasa— se despliega a Fly.io. En pull requests corre todo menos el deploy.
#
# Secret requerido: FLY_API_TOKEN (fly tokens create deploy -x 999999h)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint, validación y build ─────────────────────────────────────────────
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci-placeholder.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JS syntax (server)
        run: |
          find server -name "*.js" -not -path "*/node_modules/*" | xargs -I{} node --check {}

      - name: Validate SQLite schema
        run: npx prisma validate --schema server/prisma/schema.prisma

      - name: Validate PostgreSQL schema
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
        run: npx prisma validate --schema server/prisma/postgresql/schema.prisma

      - name: Vite build (frontend)
        run: npm run build
        env:
          VITE_API_BASE: /api

      - name: Prisma generate (SQLite – dev schema)
        run: npx prisma generate --schema server/prisma/schema.prisma

  # ─── Integration tests ────────────────────────────────────────────────────
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_ENV: test
      DATABASE_URL: file:./server/prisma/test.db
      SESSION_SECRET: ci-only-session-secret-not-used-in-production
      FRONTEND_ORIGINS: http://localhost:5173
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      TRUST_PROXY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm ci no genera el cliente Prisma (el schema no está en la ruta por
      # defecto), y migrate deploy tampoco lo hace: sin este paso, cada test
      # muere al importar @prisma/client.
      - name: Prisma generate (SQLite – dev schema)
        run: npx prisma generate --schema server/prisma/schema.prisma

      - name: Apply SQLite migrations
        run: npx prisma migrate deploy --schema server/prisma/schema.prisma
        env:
          DATABASE_URL: file:./server/prisma/test.db

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: file:./server/prisma/test.db

  # ─── Docker image build check ─────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tic-toc-pharma:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy a producción (Fly.io) ─────────────────────────────────────────
  # Solo corre en push a main y únicamente si las pruebas y el build de la
  # imagen pasaron. Su grupo de concurrencia propio evita cancelar un deploy
  # a mitad de rollout: los deploys se encolan en lugar de interrumpirse.
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test, docker]
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
