name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & build ─────────────────────────────────────────────────────────
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build (frontend)
        run: npm run build
        env:
          VITE_API_BASE: /api

      - name: Prisma generate (SQLite – dev schema)
        run: npx prisma generate --schema server/prisma/schema.prisma

  # ─── Integration tests ────────────────────────────────────────────────────
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_ENV: test
      DATABASE_URL: file:./server/prisma/test.db
      SESSION_SECRET: ci-only-session-secret-not-used-in-production
      FRONTEND_ORIGINS: http://localhost:5173
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      TRUST_PROXY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply SQLite migrations
        run: npx prisma migrate deploy --schema server/prisma/schema.prisma
        env:
          DATABASE_URL: file:./server/prisma/test.db

      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: file:./server/prisma/test.db

  # ─── Docker image build check ─────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tic-toc-pharma:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to production ─────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [test, docker]
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # ── Option A: Railway ──────────────────────────────────────────────────
      # Uncomment + set RAILWAY_TOKEN in GitHub → Settings → Secrets
      # - name: Deploy to Railway
      #   uses: railwayapp/railway-github-action@v0.1.0
