# CI/CD — Tic Toc Pharma
# Runs on every push to main:
#   1. Validates JS syntax (node --check) on server files
#   2. Validates both Prisma schemas
#   3. Deploys to Fly.io
#
# Required GitHub Secrets:
#   FLY_API_TOKEN  — from: fly tokens create deploy -x 999999h

name: Deploy to Fly.io

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      # prisma validate needs DATABASE_URL even for static schema checks
      DATABASE_URL: "file:./ci-placeholder.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check JS syntax (server)
        run: |
          find server -name "*.js" -not -path "*/node_modules/*" | xargs -I{} node --check {}

      - name: Validate SQLite schema
        run: npx prisma validate --schema server/prisma/schema.prisma

      - name: Validate PostgreSQL schema
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
        run: npx prisma validate --schema server/prisma/postgresql/schema.prisma

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
